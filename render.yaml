services:
  - type: web
    name: air-india-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: web
    name: air-india-frontend
    runtime: python
    rootDir: ./frontend
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: BACKEND_URL
        value: "https://air-india-backend.onrender.com"